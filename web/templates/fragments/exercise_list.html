{% for category, functions in exercises.items() %}
    <h2>{{ category }}</h2>
    <ul>
        {% for function in functions %}
            <li>
                <a
                    href="#"
                    hx-get="/exercises/{{ category }}/{{ function }}"
                    hx-target="#main-content"
                    hx-swap="innerHTML"
                >
                    {{ function }}
                </a>
            </li>
        {% endfor %}
    </ul>
{% endfor %}
