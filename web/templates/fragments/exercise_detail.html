<h2>Ejercicio</h2>

<p><strong>Categoría:</strong> {{ category_titles.get(category_name, category_name|capitalize) }}</p>
<p><strong>Título:</strong> {{ function_name.replace('_', ' ')|capitalize }}</p>

<h3>Descripción de la función</h3>

<pre class="problem-description">
{{ problem_description }}
</pre>

<h3>Código</h3>

<form
    hx-post="/exercises/{{ category_name }}/{{ function_name }}/run"
    hx-target="#result"
    hx-swap="innerHTML"
>
<textarea
    id="code-editor"
    name="code"
    data-storage-key="exercise-{{ category_name }}-{{ function_name }}"
>{{ function_signature }}</textarea>

    <br><br>

    <div class="exercise-actions">
        <button type="submit">
            Ejecutar
        </button>
        <button type="button" id="reset-exercise" class="button-secondary">
            Reiniciar ejercicio
        </button>
    </div>
</form>

<h3>Resultado</h3>
<div id="result"></div>
