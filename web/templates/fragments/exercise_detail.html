<h2>Ejercicio</h2>

<p><strong>Categoría:</strong> {{ category_name }}</p>
<p><strong>Función:</strong> {{ function_name }}</p>

<h3>Enunciado</h3>

<pre class="problem-description">
{{ problem_description }}
</pre>

<h3>Código</h3>

<form
    hx-post="/exercises/{{ category_name }}/{{ function_name }}/run"
    hx-target="#result"
    hx-swap="innerHTML"
>
<textarea
    id="code-editor"
    name="code"
    data-storage-key="exercise-{{ category_name }}-{{ function_name }}"
>{{ function_signature }}</textarea>

    <br><br>

    <button type="submit">
        Ejecutar
    </button>
</form>

<h3>Resultado</h3>
<div id="result"></div>
