<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Plataforma de Ejercicios</title>

    <link rel="icon" href="/static/favicon.ico" type="image/x-icon">
    
    <!-- HTMX from CDN -->
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>

    <!-- CodeMirror from CDN -->
    <link rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/python/python.min.js"></script>
</head>

<body>

    <h1>Ejercicios disponibles</h1>

    <button
        hx-get="/exercises"
        hx-trigger="click"
        hx-target="#main-content"
        hx-swap="innerHTML"
        hx-push-url="/exercises"
    >
        Cargar ejercicios
    </button>


    <hr>

    <div id="main-content">
        {% if problem_description %}
            {% include "fragments/exercise_detail.html" %}
        {% elif exercise_groups %}
            {% include "fragments/exercise_list.html" %}
        {% else %}
            <p>Seleccioná un ejercicio para comenzar.</p>
        {% endif %}
    </div>

    <script>
    function initializeCodeEditor() {
        const textarea = document.getElementById("code-editor");

        if (!textarea) return;

        if (textarea.dataset.editorInitialized === "true") return;

        const editor = CodeMirror.fromTextArea(textarea, {
            mode: "python",
            lineNumbers: true,
            indentUnit: 4,
            tabSize: 4,
            indentWithTabs: false,
            lineWrapping: false,
            extraKeys: {
                Tab: function(cm) {
                    cm.replaceSelection("    ", "end");
                }
            }
        });

        const storageKey = textarea.dataset.storageKey;
        const savedCode = sessionStorage.getItem(storageKey);

        if (savedCode) {
            editor.setValue(savedCode);
        }

        editor.on("change", function(cm) {
            sessionStorage.setItem(storageKey, cm.getValue());
        });

        textarea.dataset.editorInitialized = "true";
        textarea._editorInstance = editor;

        const totalLines = editor.lineCount();
        editor.setCursor({ line: totalLines - 1, ch: 4 });
        editor.focus();
    }

    document.addEventListener("DOMContentLoaded", function() {
        initializeCodeEditor();
    });

    document.body.addEventListener("htmx:afterSwap", function() {
        initializeCodeEditor();
    });
    </script>

</body>
</html>
